name: Update M3U

on:
  schedule:
    - cron: "0 7,11,15,19 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Generate playlist
        run: python generate_playlist.py

      - name: Get Madrid time (multi-source)
        run: |
          URLS=(
            "https://timeapi.io/api/Time/current/zone?timeZone=Europe/Madrid"
            "https://worldtimeapi.org/api/timezone/Europe/Madrid"
          )
      
          for URL in "${URLS[@]}"; do
            RESPONSE=$(curl -s --fail --max-time 20 "$URL") && break
          done
      
          if echo "$RESPONSE" | jq -e '.dateTime' > /dev/null 2>&1; then
            MADRID_TIME=$(jq -r '.dateTime | split(".")[0] | gsub("T"; " ")' <<< "$RESPONSE")
          elif echo "$RESPONSE" | jq -e '.datetime' > /dev/null 2>&1; then
            MADRID_TIME=$(jq -r '.datetime | split(".")[0] | gsub("T"; " ")' <<< "$RESPONSE")
          else
            echo "All APIs failed, fallback to UTC"
            MADRID_TIME=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          fi
      
          echo "MADRID_TIME=$MADRID_TIME" >> $GITHUB_ENV

      - name: Commit & push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add output/updated_playlist.m3u
          git commit -m "Auto update playlist - $MADRID_TIME" || echo "No changes"
          git pull --rebase origin main
          git push

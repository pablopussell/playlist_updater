name: Update M3U

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    
    env: 
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Generate playlist
        run: python generate_playlist.py

      - name: Get Madrid time
        id: madrid_time
        run: |
          # Install tzdata to handle timezone conversion
          sudo apt-get update && sudo apt-get install -y tzdata
          # Set Madrid timezone
          export TZ="Europe/Madrid"
          # Get formatted date
          echo "MADRID_TIME=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

      - name: Commit & push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add output/updated_playlist.m3u
          git commit -m "Auto update playlist - $MADRID_TIME" || echo "No changes"
          git pull --rebase origin main
          git push

name: Update M3U

on:
  schedule:
    - cron: "0 7,11,15,19 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Generate playlist
        run: python generate_playlist.py

      - name: Get Madrid time (API)
        run: |
          RESPONSE=$(curl -s http://worldtimeapi.org/api/timezone/Europe/Madrid)
          MADRID_TIME=$(echo "$RESPONSE" | jq -r '.datetime' | cut -d'.' -f1 | sed 's/T/ /')
          echo "MADRID_TIME=$MADRID_TIME" >> $GITHUB_ENV

      - name: Commit & push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add output/updated_playlist.m3u
          git commit -m "Auto update playlist - $MADRID_TIME" || echo "No changes"
          git pull --rebase origin main
          git push
